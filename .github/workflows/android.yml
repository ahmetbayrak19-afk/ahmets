name: Android Clean Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Gradle Cache (Hız için)
      - name: Cache Gradle Wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      # React Build
      - name: Build Web Assets
        run: npm run build

      # 🔥 DÜZELTİLEN KISIM: DOSYAYI KORUYARAK KOPYALAMA 🔥
      - name: Safe Copy Assets
        run: |
          echo "Dosya transferi başlıyor..."

          # 1. human.glb dosyasını repo'dan geldiği yerde bul ve geçici olarak /tmp'ye yedekle
          if [ -f android/app/src/main/assets/human.glb ]; then
            cp android/app/src/main/assets/human.glb /tmp/human_safe.glb
            echo "✅ human.glb repo içinde bulundu ve korumaya alındı."
          else
            echo "⚠️ UYARI: human.glb repo içinde bulunamadı!"
          fi

          # 2. Assets klasörünü temizle (Eski React dosyaları çöp olmasın diye)
          rm -rf android/app/src/main/assets/*
          mkdir -p android/app/src/main/assets

          # 3. Yeni React Build'i (dist) kopyala
          if [ -d "dist" ]; then
             cp -r dist/* android/app/src/main/assets/
             echo "✅ React build dosyaları kopyalandı."
          else
             echo "❌ HATA: dist klasörü bulunamadı. Build başarısız olmuş olabilir."
             exit 1
          fi

          # 4. human.glb dosyasını yedeğinden geri yükle
          if [ -f /tmp/human_safe.glb ]; then
            cp /tmp/human_safe.glb android/app/src/main/assets/human.glb
            echo "✅ human.glb başarıyla assets klasörüne geri kondu."
          else
             echo "⚠️ human.glb yedeği yok, dosya eklenmedi."
          fi
          
          # 5. Son durum kontrolü (Loglarda human.glb görmelisin)
          echo "📂 Final Assets Klasörü İçeriği:"
          ls -la android/app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
