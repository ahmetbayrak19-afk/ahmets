name: Android Clean Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Gradle Cache (Hız için - Aynen kalıyor)
      - name: Cache Gradle Wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            { runner.os }}-gradle-caches-

      # React Build (Burada public içindeki human.glb otomatik dist'e giriyor)
      - name: Build Web Assets
        run: npm run build

      # 🔥 YENİ SADELEŞTİRİLMİŞ KOPYALAMA ADIMI 🔥
      # Yedekleme yok, geri yükleme yok. Direkt dist'i basıyoruz.
      - name: Sync React Build to Android
        run: |
          echo "Eski assets klasörü temizleniyor..."
          rm -rf android/app/src/main/assets/*
          mkdir -p android/app/src/main/assets

          echo "Yeni build (human.glb dahil) kopyalanıyor..."
          # dist klasöründeki her şeyi Android assets'e at
          cp -r dist/* android/app/src/main/assets/

          echo "📂 Kontrol edelim, human.glb orada mı?"
          ls -la android/app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
