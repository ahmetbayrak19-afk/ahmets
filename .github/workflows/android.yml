name: Android Clean Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm' # ✅ npm paketlerini otomatik hafızaya alır

      - name: Install dependencies
        run: npm install

      # ✅ Gradle Cache: Gradle dosyalarını ve bağımlılıkları saklar
      - name: Cache Gradle Wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Build Web Assets
        run: npm run build

      - name: Copy Web Assets to Android
        run: |
          rm -rf android/app/src/main/assets/*
          mkdir -p android/app/src/main/assets
          cp -r dist/. android/app/src/main/assets/
          ls -R android/app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # ✅ Java kurulumu üzerinden de gradle cache'ini destekler

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
