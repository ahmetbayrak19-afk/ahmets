name: Android Clean Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Gradle önbellekleme (Hız için)
      - name: Cache Gradle Wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      # React projesini derle
      - name: Build Web Assets
        run: npm run build

      # 🔥 KRİTİK ADIM: human.glb'yi koruyarak kopyalama 🔥
      - name: Smart Copy Web Assets to Android
        run: |
          echo "Dosya transferi başlıyor..."
          
          # 1. human.glb dosyasını yedekle (Eğer varsa)
          if [ -f android/app/src/main/assets/human.glb ]; then
            cp android/app/src/main/assets/human.glb human_backup.glb
            echo "✅ human.glb bulundu ve güvene alındı."
          else
            echo "⚠️ UYARI: human.glb repo içinde bulunamadı! (Push etmeyi unuttun mu?)"
          fi

          # 2. Assets klasörünü temizle (Eski kod kalmasın)
          rm -rf android/app/src/main/assets/*
          mkdir -p android/app/src/main/assets

          # 3. Yeni React Build'i (dist) kopyala
          # Not: Vite kullanıyorsan klasör 'dist', CreateReactApp ise 'build' olur.
          # Senin projende 'dist' olduğunu varsayıyoruz.
          cp -r dist/. android/app/src/main/assets/

          # 4. human.glb dosyasını yedeğinden geri yükle
          if [ -f human_backup.glb ]; then
            mv human_backup.glb android/app/src/main/assets/human.glb
            echo "✅ human.glb başarıyla geri yüklendi."
          fi
          
          # 5. Son kontrol (Listeleme)
          ls -R android/app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
